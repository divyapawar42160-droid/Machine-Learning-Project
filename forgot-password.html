<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password</title>

  <!-- Boxicons CDN -->
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

    :root {
      --white: #fff;
      --black: #000;
      --lightBlue: #17a;
      --success: #28a745;
      --error: #dc3545;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, rgba(15, 23, 42, 0.7), rgba(30, 41, 59, 0.7)),
        url("{{ url_for('static', filename='image.jpg') }}") no-repeat center center / cover;
    }

    .wrapper {
      position: relative;
      width: 450px;
      padding: 40px;
      background: var(--white);
      border: 2px solid var(--black);
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
      overflow: hidden;
    }

    .wrapper h2 {
      font-size: 28px;
      color: var(--black);
      text-align: center;
      position: relative;
      margin-bottom: 20px;
    }

    .wrapper h2::after {
      content: "";
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 40px;
      height: 4px;
      background: var(--black);
    }

    .input-box {
      position: relative;
      width: 100%;
      height: 50px;
      margin: 25px 0;
    }

    .input-box input {
      width: 100%;
      height: 100%;
      background: transparent;
      color: var(--black);
      font-size: 16px;
      font-weight: 500;
      border: none;
      outline: none;
      border-bottom: 2px solid var(--black);
      transition: .5s;
      padding-right: 23px;
    }

    .input-box input:focus,
    .input-box input:valid {
      border-bottom-color: var(--lightBlue);
    }

    .input-box label {
      position: absolute;
      top: 50%;
      left: 0;
      transform: translateY(-50%);
      font-size: 16px;
      color: var(--black);
      pointer-events: none;
      transition: 0.5s;
    }

    .input-box input:focus~label,
    .input-box input:valid~label {
      top: -5px;
      color: var(--lightBlue);
    }

    .input-box i {
      position: absolute;
      top: 50%;
      right: 0;
      transform: translateY(-50%);
      font-size: 18px;
      transition: 0.5s;
    }

    .input-box input:focus~i,
    .input-box input:valid~i {
      color: var(--lightBlue);
    }

    button {
      width: 100%;
      height: 45px;
      background-color: var(--black);
      color: var(--white);
      border: none;
      outline: none;
      border-radius: 40px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      transition: .3s;
    }

    button:hover {
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
    }

    .linkTxt {
      font-size: 14px;
      color: var(--black);
      text-align: center;
      margin-top: 20px;
    }

    .linkTxt a {
      color: blue;
      text-decoration: none;
      font-weight: 600;
    }

    .fade-in {
      opacity: 0;
      transform: translateY(20px);
      animation: fadeIn 0.8s ease forwards;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .flash-message {
      text-align: center;
      padding: 10px 20px;
      margin-top: 15px;
      border-radius: 8px;
      font-size: 14px;
    }

    .flash-success {
      background-color: #d4edda;
      color: var(--success);
      border: 1px solid #c3e6cb;
    }

    .flash-error {
      background-color: #f8d7da;
      color: var(--error);
      border: 1px solid #f5c6cb;
    }
  </style>
</head>
<body>

  <div class="wrapper fade-in">
    <h2>Forgot Password</h2>
    <form id="forgotForm" method="POST" action="{{ url_for('forgot_password') }}">
      <div class="input-box">
        <input type="email" id="email" name="email" required>
        <label for="email">Email</label>
        <i class='bx bxs-envelope'></i>
      </div>

      <div class="input-box">
        <input type="password" id="password" name="password" required>
        <label for="password">New Password</label>
        <i class='bx bxs-lock-alt'></i>
      </div>

      <button type="submit">Reset Password</button>

      <!-- Flash Messages -->
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="flash-message flash-{{ category }}">{{ message }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <div class="linkTxt">
        <p>Back to <a href="{{ url_for('login') }}">Login</a></p>
      </div>
    </form>
  </div>

</body>
</html>
